server {
    listen 80;
    server_name 7continent-dagestan.ru www.7continent-dagestan.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 7continent-dagestan.ru www.7continent-dagestan.ru;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/7continent-dagestan.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/7continent-dagestan.ru/privkey.pem;
    
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /usr/share/nginx/html;
    index index.html;

    # --- УПРАВЛЕНИЕ КЭШИРОВАНИЕМ ---

    # Запрещаем кэшировать index.html, чтобы пользователи сразу видели обновления
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # Кэшируем статические ассеты (JS, CSS, изображения), так как Vite дает им уникальные имена
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Основной роут React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- ПРОКСИРОВАНИЕ НА БЭКЕНД ---

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }
}