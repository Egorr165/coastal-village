server {
    listen 80;
    server_name 7continent-dagestan.ru www.7continent-dagestan.ru;

    # Специальный роут для подтверждения владения доменом для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Все остальные запросы по HTTP (80 порт) перенаправляем на защищенный HTTPS (443 порт)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 7continent-dagestan.ru www.7continent-dagestan.ru;

    # Пути к сертификатам, которые сгенерирует Certbot
    ssl_certificate /etc/letsencrypt/live/7continent-dagestan.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/7continent-dagestan.ru/privkey.pem;
    
    # Настройки безопасности SSL (скачиваются скриптом инициализации)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Обработка маршрутов React (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API запросов на бэкенд
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксирование админки Django
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Проксирование Swagger
    location /swagger/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Раздача статики Django (админка, swagger)
    location /static/ {
        alias /app/static/;
    }

    # Раздача загруженных пользователями файлов
    location /media/ {
        alias /app/media/;
    }
}
